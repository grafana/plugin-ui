pre-commit:
  parallel: true
  commands:
    frontend-lint:
      glob: '*.{js,ts,tsx}'
      run: |
        npm run lint -- --fix {staged_files}
        npx prettier --write {staged_files}
      stage_fixed: true
    spellcheck:
      run: npx cspell -c cspell.config.json --no-must-find-files {staged_files}
